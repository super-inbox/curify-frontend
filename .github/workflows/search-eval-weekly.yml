name: Search Eval Weekly

# Runs scripts/eval_search.cjs against the 36-query regression set every
# Monday morning UTC. Posts the summary as a GitHub Actions run summary
# (visible in the workflow's "Summary" tab). No commit — this is a
# pure read-only check that fails the workflow if any query verdict
# regresses to FAIL.
#
# Designed as the post-deploy regression check the user named on
# 2026-05-22. Catches recall regressions from alias edits, template
# moves, search/page.tsx changes that landed during the prior week.
#
# Set up OPENAI_API_KEY as a repo secret if you want the rewriter pass
# to run too (otherwise the eval falls back to base scoring only).
on:
  schedule:
    # Monday 09:00 UTC = 17:00 Beijing time, 01:00 PT
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm ci || npm install

      - name: Run eval (base scoring)
        id: eval
        run: |
          set -o pipefail
          node scripts/eval_search.cjs --quiet 2>&1 | tee eval_output.txt
          tail -1 eval_output.txt | tee -a $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>Full eval table</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat eval_output.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

      - name: Fail on FAIL verdicts
        run: |
          if grep -q "FAIL" eval_output.txt; then
            echo "::error::Eval found FAIL verdicts — recall regression detected"
            exit 1
          fi
          echo "All eval queries PASS or WARN."
