name: Sync Nano Prompts to Redis

on:
  push:
    branches:
      - main
    paths:
      - "public/data/nanobanana.json"
      - "scripts/sync_nanoprompts_to_redis.cjs"
      - "scripts/regen_nanobanana_metadata.cjs"
      - "scripts/snapshot_top_remix_prompts.cjs"
      - ".github/workflows/sync_nanoprompts_to_redis.yml"
  schedule:
    # Weekly Monday 06:00 UTC — refreshes public/data/top_remix_prompts.json
    # (top-25 gallery prompts by 30d copy count + featured_boost picks)
    # for the home fused rail. Redis sync step is idempotent so weekly
    # fire is harmless. Daily was overkill — the 30d-window denominator
    # plus weekly featured_boost edits don't churn the leaderboard fast
    # enough to need a daily refresh.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-nanoprompts:
    runs-on: ubuntu-latest

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Regenerate nanobanana metadata
        run: node scripts/regen_nanobanana_metadata.cjs

      - name: Commit and push directly to main
        run: |
          if git diff --quiet -- lib/generated/nanobanana_prompts_metadata.json; then
            echo "No metadata changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/generated/nanobanana_prompts_metadata.json
          git commit -m "chore: auto-update nanobanana_prompts_metadata.json"
          git push

      - name: Sync nanoprompts to Redis
        env:
          REDIS_HOST: curify-nano-redis.westus2.redis.azure.net
          REDIS_PORT: 10000
          REDIS_USERNAME: default
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          REDIS_TLS: true
        run: npm run redis:sync:nanoprompts

      - name: Snapshot top-25 remixed gallery prompts (30d)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          npm install pg --no-save
          node scripts/snapshot_top_remix_prompts.cjs

      - name: Commit snapshot if changed
        run: |
          if git diff --quiet -- public/data/top_remix_prompts.json; then
            echo "No snapshot changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/top_remix_prompts.json
          git commit -m "chore: auto-update top_remix_prompts.json (30d copy snapshot)"
          git push